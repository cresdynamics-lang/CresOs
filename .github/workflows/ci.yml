name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  api-and-web:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cresos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d cresos_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/cresos_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: API — install, migrate, test, build
        working-directory: apps/api
        run: |
          npm ci
          npx prisma migrate deploy
          npm run test
          npm run build

      - name: Web — install & build
        working-directory: apps/web
        run: |
          npm ci
          npm run build

      - name: Web — typecheck (lint script)
        working-directory: apps/web
        run: npm run lint
