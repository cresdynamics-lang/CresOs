# Local / staging: PostgreSQL + API
# Usage: docker compose up --build
# Then open http://localhost:4000/health — use /health/ready for DB checks.

services:
  db:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cresos
      POSTGRES_PASSWORD: cresos
      POSTGRES_DB: cresos
    ports:
      - "127.0.0.1:5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cresos -d cresos"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - cresos_pg:/var/lib/postgresql/data

  api:
    restart: unless-stopped
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - cresos_api_uploads:/app/uploads
    environment:
      # Use host Postgres when compose `db` is not running (e.g. existing cresos-db-1 on :5435)
      DATABASE_URL: ${DATABASE_URL:-postgresql://cresos:cresos@host.docker.internal:5435/cresos}
      JWT_SECRET: ${CRESOS_DOCKER_JWT_SECRET:-local-docker-jwt-secret-change-me-32ch}
      PORT: "4000"
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_API_KEY_SECONDARY: ${GROQ_API_KEY_SECONDARY:-}
      GROQ_API_KEY_TERTIARY: ${GROQ_API_KEY_TERTIARY:-}
      GROQ_DIRECTOR_MODEL: ${GROQ_DIRECTOR_MODEL:-llama-3.3-70b-versatile}
      GROQ_REMINDER_MODEL: ${GROQ_REMINDER_MODEL:-llama-3.3-70b-versatile}
      GROQ_EMAIL_MODEL: ${GROQ_EMAIL_MODEL:-llama-3.3-70b-versatile}
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USER: ${IMAP_USER:-}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-}
      EMAIL_AUTOMATION_ENABLED: ${EMAIL_AUTOMATION_ENABLED:-true}
      EMAIL_AUTOMATION_POLL_INTERVAL: ${EMAIL_AUTOMATION_POLL_INTERVAL:-10}
      DIRECTOR_AI_AUTO_REPLY: ${DIRECTOR_AI_AUTO_REPLY:-true}
      DIRECTOR_AI_BRIEFING_GROQ: ${DIRECTOR_AI_BRIEFING_GROQ:-true}
      CHAT_UPLOAD_MAX_FILE_BYTES: ${CHAT_UPLOAD_MAX_FILE_BYTES:-576716800}
      CHAT_UPLOAD_MAX_FILES: ${CHAT_UPLOAD_MAX_FILES:-34}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      RESEND_REPLY_TO: ${RESEND_REPLY_TO:-}
      RESEND_FROM_EMAIL_FINANCE: ${RESEND_FROM_EMAIL_FINANCE:-}
      RESEND_REPLY_TO_FINANCE: ${RESEND_REPLY_TO_FINANCE:-}
      RESEND_FROM_EMAIL_SALES: ${RESEND_FROM_EMAIL_SALES:-}
      RESEND_REPLY_TO_SALES: ${RESEND_REPLY_TO_SALES:-}
      RESEND_FROM_EMAIL_DIRECTOR: ${RESEND_FROM_EMAIL_DIRECTOR:-}
      RESEND_REPLY_TO_DIRECTOR: ${RESEND_REPLY_TO_DIRECTOR:-}
      COMPOSE_CONTACT_PHONE: ${COMPOSE_CONTACT_PHONE:-0708805496}
      COMPOSE_CONTACT_PHONE_E164: ${COMPOSE_CONTACT_PHONE_E164:-254708805496}
      COMPOSE_REPLY_EMAIL: ${COMPOSE_REPLY_EMAIL:-info@cresdynamics.com}
      MAIL_MAILER: ${MAIL_MAILER:-resend}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Cres Dynamics}
    depends_on:
      db:
        condition: service_healthy
        required: false

  web:
    restart: unless-stopped
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    depends_on:
      api:
        condition: service_started

volumes:
  cresos_pg:
  cresos_api_uploads:
