# Local / staging: PostgreSQL + API
# Usage: docker compose up --build
# Then open http://localhost:4000/health — use /health/ready for DB checks.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cresos
      POSTGRES_PASSWORD: cresos
      POSTGRES_DB: cresos
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cresos -d cresos"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - cresos_pg:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://cresos:cresos@db:5432/cresos
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: "4000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  cresos_pg:
